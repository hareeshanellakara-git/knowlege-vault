<!DOCTYPE html>
<html lang="en">

<head>
    <title>Exam Tracker | Knowledge Vault</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>



    <!-- Navbar -->

    <div class="navbar">
        <div class="navlinks" id="navLinks">
            <ul>
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
                <li><a href="exam_tracker.html"><i class="fa-solid fa-chart-column"></i> Exam Tracker</a></li>
                <li><a href="upload_bookmark.html"><i class="fa-solid fa-upload"></i> Upload & Bookmark</a></li>
                <li><a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a></li>
                <li><a href="help.html"><i class="fa-solid fa-circle-question"></i> Help</a></li>
            </ul>
        </div>
        <div id="logo">
            <img src="logo.jpg" alt="logo">
        </div>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            ☰
            
        </div>

        <button id="darkToggle" onclick="toggleDark()" title="Toggle Dark Mode">🌙</button>
    </div>


    <div class="common">

        <p class="main-heading">Exam Preparation Tracker</p>

        <!-- STREAK -->
        <div class="streak-wrapper">
            <div class="streak-box">
                <span id="streakCount">0</span> Day Streak
            </div>
        </div>
        <div class="demo-buttons">
            <button onclick="demoNormal()">Normal</button>
            <button onclick="demoGolden()">Golden 🔥</button>
        </div>

        <!-- ADD SUBJECT FORM -->
        <div class="section-box">

            <form id="examForm" class="exam-form">

                <div class="form-group">
                    <label>Subject / Topic</label>
                    <input type="text" id="subjectName" class="topic-check" placeholder="Subject / Topic Name" required>
                </div>

                <div class="form-group">
                    <label>Exam Date</label>
                    <input type="date" id="examDate" class="topic-check" required>
                </div>

                <div class="form-group">
                    <label>Revision Date</label>
                    <input type="date" id="reviseDate" class="topic-check">
                </div>

                <div class="form-group">
                    <label>Priority</label>
                    <select id="priority" class="topic-check">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>

                <button type="submit" class="btn-main">Add Subject</button>

            </form>

        </div>
        <!-- SEARCH BAR -->
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchBox" placeholder="Search subjects...">
            <span class="clear-btn" onclick="clearSearch()">✖</span>
        </div>

        <!-- SUBJECT CARDS -->
        <div id="subjectsGrid" class="subjects-grid"></div>

    </div>

    <footer>
        <p class="text">© 2026 Knowledge Vault · Designed and Developed by Hareesha Nellakara</p>
    </footer>

    <script src="exam_tracker.js"></script>
    <script>
        document.getElementById('hamburger').addEventListener('click', function () {
            this.classList.toggle('open');
            document.getElementById('navLinks').classList.toggle('open');
        });

        function toggleDark() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark ? 'on' : 'off');
            document.getElementById('darkToggle').textContent = isDark ? '☀️' : '🌙';
        }

        // On page load — restore saved preference
        (function () {
            if (localStorage.getItem('darkMode') === 'on') {
                document.body.classList.add('dark');
                const btn = document.getElementById('darkToggle');
                if (btn) btn.textContent = '☀️';
            }
        })();
    </script>
</body>

</html>
